<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro</title>
  <style>
    :root {
      --bg-1: #05122f;
      --bg-2: #0c4dbf;
      --bg-3: #40bffb;
      --card: rgba(10, 66, 168, 0.5);
      --text: #e8f4ff;
      --muted: #b7d8ff;
      --primary: #f8d24f;
      --primary-hover: #e4bc38;
      --primary-text: #18315e;
      --ring: rgba(108, 204, 255, 0.34);
      --border: rgba(173, 225, 255, 0.35);
      --danger: #ffb1b1;
      --ok: #9dffbe;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(900px 500px at 85% 90%, rgba(164, 238, 255, 0.35), transparent 65%),
        linear-gradient(160deg, var(--bg-1) 8%, var(--bg-2) 58%, var(--bg-3) 100%);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(100%, 460px);
      background: linear-gradient(165deg, rgba(11, 81, 198, 0.56), var(--card));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 22px 38px rgba(0, 10, 32, 0.35);
      backdrop-filter: blur(5px);
    }

    h1 {
      font-size: 1.65rem;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 22px;
      font-size: 0.95rem;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(5, 38, 99, 0.55);
      color: var(--text);
      padding: 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: var(--muted);
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .terms input {
      margin-top: 2px;
      width: auto;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary-text);
      background: var(--primary);
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    #status {
      min-height: 20px;
      font-size: 0.9rem;
      margin-top: 2px;
    }

    #status.error {
      color: var(--danger);
    }

    #status.success {
      color: var(--ok);
    }

    .login-link {
      margin-top: 14px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .login-link a {
      color: #ffe58f;
      text-decoration: none;
      font-weight: 700;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Criar conta</h1>
    <p class="subtitle">Preencha os campos abaixo para fazer seu registro.</p>

    <form id="registroForm" action="#" method="post" novalidate>
      <div class="field">
        <label for="nome">Nome completo</label>
        <input id="nome" name="nome" type="text" autocomplete="name" required />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="usuario">Utilizador</label>
        <input id="usuario" name="usuario" type="text" autocomplete="username" minlength="4" required />
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" autocomplete="new-password" minlength="8" required />
      </div>

      <div class="field">
        <label for="confirmarSenha">Confirmar senha</label>
        <input id="confirmarSenha" name="confirmarSenha" type="password" autocomplete="new-password" minlength="8" required />
      </div>

      <label class="terms" for="termos">
        <input id="termos" name="termos" type="checkbox" required />
        <span>Li e aceito os termos de uso e politica de privacidade.</span>
      </label>

      <button type="submit">Registrar</button>
      <p id="status" aria-live="polite"></p>
    </form>

    <p class="login-link">Ja tem conta? <a href="#">Entrar</a></p>
  </main>

  <script>
    const form = document.getElementById("registroForm");
    const senha = document.getElementById("senha");
    const confirmarSenha = document.getElementById("confirmarSenha");
    const statusMsg = document.getElementById("status");

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      statusMsg.textContent = "";
      statusMsg.className = "";

      if (!form.checkValidity()) {
        statusMsg.textContent = "Preencha todos os campos obrigatorios corretamente.";
        statusMsg.classList.add("error");
        form.reportValidity();
        return;
      }

      if (senha.value !== confirmarSenha.value) {
        statusMsg.textContent = "As senhas nao coincidem.";
        statusMsg.classList.add("error");
        confirmarSenha.focus();
        return;
      }

      statusMsg.textContent = "Registro enviado com sucesso!";
      statusMsg.classList.add("success");
      form.reset();
    });
  </script>
</body>
</html>
