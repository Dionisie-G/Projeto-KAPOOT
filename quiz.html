<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KAPOOT | Play</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0d6efd;
      --accent: #ffd54a;
      --accent-dark: #f2bf18;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.22);
      --danger: #ff5e5e;
      --success: #2ecc71;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0c52c7 0%, #0a78ff 45%, #43b8ff 100%);
      color: var(--white);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Background decorativo igual ao Login */
    .bg-blur {
      position: fixed; inset: 0; pointer-events: none; z-index: -1;
    }
    .bg-blur span {
      position: absolute; border-radius: 50%; background: rgba(255,255,255,0.08); filter: blur(40px);
    }

    header {
      padding: 20px 7%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
    }

    .logo { font-size: 1.8rem; font-weight: 800; color: var(--accent); text-decoration: none; }

    .screen { display: none; padding: 40px 7%; flex-direction: column; align-items: center; width: 100%; }
    .screen.active { display: flex; animation: fadeIn 0.4s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Cards e Containers */
    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 800px;
      text-align: center;
    }

    /* Grid de Quizzes (Home) */
    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px; width: 100%; max-width: 1000px; margin-top: 30px;
    }

    .quiz-item {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      padding: 30px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 700;
      font-size: 1.2rem;
    }
    .quiz-item:hover { transform: translateY(-5px); background: rgba(255,255,255,0.2); border-color: var(--accent); }

    /* Estilo do Quiz Ativo */
    .timer-bar {
      width: 100%; height: 8px; background: rgba(255,255,255,0.1);
      border-radius: 10px; margin: 20px 0; overflow: hidden;
    }
    .timer-fill {
      height: 100%; width: 100%; background: var(--accent);
      transition: width 1s linear;
    }

    .question-text { font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; min-height: 80px; }

    .answers-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%;
    }

    .answer-btn {
      padding: 20px; border: none; border-radius: 16px;
      background: var(--glass); color: white;
      font-size: 1.1rem; font-weight: 600; cursor: pointer;
      transition: 0.2s; border: 1px solid var(--glass-border);
    }
    .answer-btn:hover { background: rgba(255,255,255,0.2); }
    
    .answer-btn.correct { background: var(--success) !important; color: white; border: none; }
    .answer-btn.wrong { background: var(--danger) !important; color: white; border: none; }

    .btn-main {
      background: var(--accent); color: #1f2430;
      padding: 15px 40px; border-radius: 16px; border: none;
      font-weight: 700; cursor: pointer; transition: 0.3s;
      margin-top: 30px; font-size: 1rem;
    }
    .btn-main:hover { background: #ffe06b; transform: scale(1.05); }

    .score-display { font-size: 1.5rem; color: var(--accent); font-weight: 800; margin-bottom: 10px; }

    @media (max-width: 600px) {
      .answers-grid { grid-template-columns: 1fr; }
      .glass-card { padding: 25px; }
    }
  </style>
</head>
<body>

  <div class="bg-blur">
    <span style="width:300px; height:300px; top:10%; left:-100px;"></span>
    <span style="width:400px; height:400px; bottom:-100px; right:-100px;"></span>
  </div>

  <header>
    <a href="#" class="logo" onclick="location.reload()">KAPOOT</a>
    <div id="headerScore" style="display:none; font-weight:700;">Pontos: <span id="livePoints" style="color:var(--accent)">0</span></div>
  </header>

  <main id="homeScreen" class="screen active">
    <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Escolha um Desafio</h1>
    <p style="color: rgba(255,255,255,0.7)">Pronto para testar os teus conhecimentos?</p>
    <div id="quizList" class="quiz-grid"></div>
  </main>

  <main id="quizScreen" class="screen">
    <div class="glass-card">
      <div id="questionCounter" style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 10px;"></div>
      <div class="timer-bar"><div id="timerFill" class="timer-fill"></div></div>
      
      <div class="question-text" id="questionText">A carregar pergunta...</div>

      <div class="answers-grid">
        <button class="answer-btn" onclick="handleAnswer(0)" id="opt0"></button>
        <button class="answer-btn" onclick="handleAnswer(1)" id="opt1"></button>
        <button class="answer-btn" onclick="handleAnswer(2)" id="opt2"></button>
        <button class="answer-btn" onclick="handleAnswer(3)" id="opt3"></button>
      </div>
    </div>
  </main>

  <main id="resultsScreen" class="screen">
    <div class="glass-card">
      <h2 style="font-size: 2rem; margin-bottom: 10px;">Quiz Terminado!</h2>
      <div class="score-display" id="finalScore">0</div>
      <p id="feedbackText" style="margin-bottom: 20px;"></p>
      <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
        <p>Acertos: <span id="correctCount" style="color:var(--success); font-weight:700;"></span></p>
        <p>Tempo Médio: <span id="avgTime" style="font-weight:700;"></span>s</p>
      </div>
      <button class="btn-main" onclick="location.reload()">Voltar ao Menu</button>
    </div>
  </main>

  <script>
    const quizzes = [
      { id: 1, title: "🧬 Biologia", questions: [
        { q: "Qual o organelo responsável pela produção de energia?", a: ["Ribossoma", "Mitocôndria", "Complexo de Golgi", "Lisossoma"], c: 1 },
        { q: "Onde se localiza a maior parte do DNA celular?", a: ["Citoplasma", "Membrana", "Núcleo", "Vacúolo"], c: 2 }
      ]},
      { id: 2, title: "🌍 Geografia", questions: [
        { q: "Qual é o maior continente do mundo?", a: ["África", "América", "Ásia", "Europa"], c: 2 },
        { q: "Qual a capital de Portugal?", a: ["Porto", "Lisboa", "Coimbra", "Braga"], c: 1 }
      ]},
      { id: 3, title: "📐 Matemática", questions: [
        { q: "Quanto é a soma dos ângulos internos de um triângulo?", a: ["90°", "360°", "180°", "270°"], c: 2 },
        { q: "Qual a fórmula da área do círculo?", a: ["π * r²", "2 * π * r", "Base * Altura", "π * d"], c: 0 }
      ]}
    ];

    let state = {
      quiz: null,
      index: 0,
      points: 0,
      corrects: 0,
      timer: null,
      timeLeft: 20,
      canAnswer: true
    };

    window.onload = () => {
      const list = document.getElementById("quizList");
      quizzes.forEach(q => {
        const div = document.createElement("div");
        div.className = "quiz-item";
        div.innerText = q.title;
        div.onclick = () => startQuiz(q.id);
        list.appendChild(div);
      });
    };

    function startQuiz(id) {
      state.quiz = quizzes.find(q => q.id === id);
      state.index = 0;
      state.points = 0;
      state.corrects = 0;
      document.getElementById("headerScore").style.display = "block";
      showScreen("quizScreen");
      loadQuestion();
    }

    function loadQuestion() {
      state.canAnswer = true;
      state.timeLeft = 20;
      const q = state.quiz.questions[state.index];
      
      document.getElementById("questionCounter").innerText = `PERGUNTA ${state.index + 1} DE ${state.quiz.questions.length}`;
      document.getElementById("questionText").innerText = q.q;
      
      q.a.forEach((text, i) => {
        const btn = document.getElementById(`opt${i}`);
        btn.innerText = text;
        btn.className = "answer-btn";
      });

      startTimer();
    }

    function startTimer() {
      const fill = document.getElementById("timerFill");
      fill.style.transition = "none";
      fill.style.width = "100%";
      
      clearInterval(state.timer);
      state.timer = setInterval(() => {
        state.timeLeft -= 1;
        fill.style.transition = "width 1s linear";
        fill.style.width = (state.timeLeft / 20 * 100) + "%";

        if (state.timeLeft <= 0) {
          handleAnswer(-1); // Tempo esgotado
        }
      }, 1000);
    }

    function handleAnswer(choice) {
      if (!state.canAnswer) return;
      state.canAnswer = false;
      clearInterval(state.timer);

      const correctIndex = state.quiz.questions[state.index].c;
      const btns = document.querySelectorAll(".answer-btn");

      if (choice === correctIndex) {
        // Cálculo de pontos estilo Kahoot: Base 500 + (Tempo restante * 25)
        const bonus = state.timeLeft * 25;
        state.points += (500 + bonus);
        state.corrects++;
        btns[choice].classList.add("correct");
      } else {
        if (choice !== -1) btns[choice].classList.add("wrong");
        btns[correctIndex].classList.add("correct");
      }

      document.getElementById("livePoints").innerText = state.points;

      setTimeout(() => {
        state.index++;
        if (state.index < state.quiz.questions.length) {
          loadQuestion();
        } else {
          showResults();
        }
      }, 1500);
    }

    function showResults() {
      showScreen("resultsScreen");
      document.getElementById("headerScore").style.display = "none";
      document.getElementById("finalScore").innerText = `${state.points} PTS`;
      document.getElementById("correctCount").innerText = `${state.corrects} / ${state.quiz.questions.length}`;
      document.getElementById("avgTime").innerText = (20 - state.timeLeft).toFixed(1);
      
      const p = (state.corrects / state.quiz.questions.length) * 100;
      document.getElementById("feedbackText").innerText = p >= 70 ? "Incrível! És um mestre!" : "Bom esforço! Tenta novamente.";
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }
  </script>
</body>
</html>
