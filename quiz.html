<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KAPOOT | Play</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0d6efd;
      --accent: #ffd54a;
      --accent-dark: #f2bf18;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.22);
      --danger: #ff5e5e;
      --success: #2ecc71;
      --info: #17a2b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0c52c7 0%, #0a78ff 45%, #43b8ff 100%);
      color: var(--white);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Background decorativo */
    .bg-blur {
      position: fixed; inset: 0; pointer-events: none; z-index: -1;
    }
    .bg-blur span {
      position: absolute; border-radius: 50%; background: rgba(255,255,255,0.08); filter: blur(40px);
    }

    header {
      padding: 20px 7%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
    }

    .logo { font-size: 1.8rem; font-weight: 800; color: var(--accent); text-decoration: none; }

    .screen { display: none; padding: 40px 7%; flex-direction: column; align-items: center; width: 100%; }
    .screen.active { display: flex; animation: fadeIn 0.4s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Cards e Containers */
    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 800px;
      text-align: center;
    }

    /* Grid de Quizzes (Home) */
    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px; width: 100%; max-width: 1200px; margin-top: 30px;
    }

    .quiz-item {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      padding: 30px 20px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 700;
      font-size: 1.2rem;
      text-align: center;
    }
    .quiz-item:hover { transform: translateY(-5px); background: rgba(255,255,255,0.2); border-color: var(--accent); }
    .quiz-item small { display: block; font-size: 0.8rem; opacity: 0.7; margin-top: 8px; font-weight: normal; }

    /* Estilo do Quiz Ativo */
    .timer-bar {
      width: 100%; height: 8px; background: rgba(255,255,255,0.1);
      border-radius: 10px; margin: 20px 0; overflow: hidden;
    }
    .timer-fill {
      height: 100%; width: 100%; background: var(--accent);
      transition: width 1s linear;
    }

    .question-text { font-size: 1.6rem; font-weight: 700; margin-bottom: 30px; min-height: 80px; line-height: 1.3; }

    .answers-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%;
    }

    .answer-btn {
      padding: 20px; border: none; border-radius: 16px;
      background: var(--glass); color: white;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: 0.2s; border: 1px solid var(--glass-border);
      text-align: left;
    }
    .answer-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.02); }
    
    .answer-btn.correct { background: var(--success) !important; color: white; border: none; }
    .answer-btn.wrong { background: var(--danger) !important; color: white; border: none; }

    .btn-main {
      background: var(--accent); color: #1f2430;
      padding: 15px 40px; border-radius: 16px; border: none;
      font-weight: 700; cursor: pointer; transition: 0.3s;
      margin-top: 30px; font-size: 1rem;
    }
    .btn-main:hover { background: #ffe06b; transform: scale(1.05); }

    .score-display { font-size: 1.5rem; color: var(--accent); font-weight: 800; margin-bottom: 10px; }

    .loading {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .answers-grid { grid-template-columns: 1fr; }
      .glass-card { padding: 25px; }
      .question-text { font-size: 1.3rem; }
    }
  
    /* ═══ HEADER UNIFICADO (KAPOOT) ═══ */
    .kapoot-header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0 6%;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(20px) saturate(1.4);
      background: rgba(10,63,168,0.25);
      width: 100%;
    }

    .kapoot-logo {
      font-family: 'Syne', 'Poppins', sans-serif;
      font-size: 1.85rem;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 2px;
      color: #fff;
    }
    .kapoot-logo .ka   { color: #ffffff; }
    .kapoot-logo .poot { color: #ffd54a; }
    .kapoot-logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffd54a;
      margin-left: 3px;
      margin-bottom: 14px;
      animation: kapoot-blink 2s ease-in-out infinite;
    }
    @keyframes kapoot-blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    .kapoot-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .kapoot-nav a {
      color: rgba(255,255,255,0.80);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.92rem;
      padding: 8px 16px;
      border-radius: 999px;
      transition: all 0.25s ease;
      border: none;
    }
    .kapoot-nav a:hover {
      color: #fff;
      background: rgba(255,255,255,0.10);
    }
    .kapoot-nav a.active {
      color: #1f2430;
      background: #ffd54a;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(255,213,74,0.30);
    }

    /* Toast partilhado */
    #kapoot-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(8,20,55,0.95);
      color: #fff;
      padding: 0.75rem 1.6rem;
      border-radius: 14px;
      border: 1px solid rgba(232,218,49,0.45);
      font-size: 0.95rem;
      font-weight: 600;
      z-index: 9999;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }
    #kapoot-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 640px) {
      .kapoot-header { padding: 0 5%; height: auto; padding: 14px 5%; flex-wrap: wrap; }
      .kapoot-nav a  { padding: 6px 10px; font-size: 0.84rem; }
      .kapoot-logo   { font-size: 1.55rem; }
    }
    /* ═══ FIM HEADER UNIFICADO ═══ */

  </style>
</head>
<body>
  <div id="kapoot-toast" role="status" aria-live="polite"></div>

  <div class="bg-blur">
    <span style="width:300px; height:300px; top:10%; left:-100px;"></span>
    <span style="width:400px; height:400px; bottom:-100px; right:-100px;"></span>
    <span style="width:200px; height:200px; top:50%; left:40%;"></span>
  </div>

  <header class="kapoot-header">
    <a class="kapoot-logo" href="index.html" aria-label="KAPOOT - Página inicial">
      <span class="ka">KA</span><span class="poot">POOT</span>
      <span class="kapoot-logo-dot"></span>
    </a>
    <nav class="kapoot-nav" aria-label="Navegação principal">
      <a href="index.html"       id="kpt-nav-inicio">Início</a>
      <a href="ranking.html"     id="kpt-nav-ranking">Ranking</a>
      <a href="quiz.html"        id="kpt-nav-quiz">Jogar</a>
      <a href="create_quiz.html" id="kpt-nav-criar">Criar Quiz</a>
      <a href="profile.html"     id="kpt-nav-perfil" style="display:none">Perfil</a>
      <a href="login.html"       id="kpt-nav-auth">Entrar</a>
    </nav>
  </header>

  <main id="homeScreen" class="screen active">
    <h1 style="font-size: 2.5rem; margin-bottom: 10px;">🎯 Escolha um Desafio</h1>
    <p style="color: rgba(255,255,255,0.7)">20 perguntas por tema. Teste os teus conhecimentos!</p>
    <div id="quizList" class="quiz-grid"></div>
  </main>

  <main id="loadingScreen" class="screen">
    <div class="glass-card">
      <div class="loading">
        <div class="spinner"></div>
        <h3>A preparar o desafio...</h3>
        <p>A carregar perguntas 🔥</p>
      </div>
    </div>
  </main>

  <main id="quizScreen" class="screen">
    <div class="glass-card">
      <div id="questionCounter" style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 10px;"></div>
      <div class="timer-bar"><div id="timerFill" class="timer-fill"></div></div>
      
      <div class="question-text" id="questionText">A carregar pergunta...</div>

      <div class="answers-grid">
        <button class="answer-btn" onclick="handleAnswer(0)" id="opt0"></button>
        <button class="answer-btn" onclick="handleAnswer(1)" id="opt1"></button>
        <button class="answer-btn" onclick="handleAnswer(2)" id="opt2"></button>
        <button class="answer-btn" onclick="handleAnswer(3)" id="opt3"></button>
      </div>
      <div style="margin-top: 20px; font-size: 0.85rem; opacity: 0.6;">⚡ Resposta rápida = mais pontos!</div>
    </div>
  </main>

  <main id="resultsScreen" class="screen">
    <div class="glass-card">
      <h2 style="font-size: 2rem; margin-bottom: 10px;">🏁 Quiz Terminado!</h2>
      <div class="score-display" id="finalScore">0</div>
      <p id="feedbackText" style="margin-bottom: 20px;"></p>
      <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
        <p>✅ Acertos: <span id="correctCount" style="color:var(--success); font-weight:700;"></span></p>
        <p>📊 Percentagem: <span id="percentCorrect" style="font-weight:700;"></span>%</p>
      </div>
      <button class="btn-main" onclick="location.reload()">🔁 Voltar ao Menu</button>
    </div>
  </main>

  <script>
    // ==================== BANCO DE PERGUNTAS - 5 TEMAS COM 20 PERGUNTAS CADA ====================
    const quizzes = [
      { id: 1, title: "🧬 Biologia", icon: "🧬", questions: generateBiologyQuestions() },
      { id: 2, title: "🌍 Geografia", icon: "🌍", questions: generateGeographyQuestions() },
      { id: 3, title: "📐 Matemática", icon: "📐", questions: generateMathQuestions() },
      { id: 4, title: "🎬 Cinema", icon: "🎬", questions: generateCinemaQuestions() },
      { id: 5, title: "⚽ Desporto", icon: "⚽", questions: generateSportsQuestions() }
    ];

    // Biologia - 20 perguntas
    function generateBiologyQuestions() {
      return [
        { q: "Qual o organelo responsável pela produção de energia na célula?", a: ["Ribossoma", "Mitocôndria", "Complexo de Golgi", "Lisossoma"], c: 1 },
        { q: "Onde se localiza a maior parte do DNA celular?", a: ["Citoplasma", "Membrana", "Núcleo", "Vacúolo"], c: 2 },
        { q: "Qual é o processo pelo qual as plantas produzem o seu próprio alimento?", a: ["Respiração", "Fermentação", "Fotossíntese", "Transpiração"], c: 2 },
        { q: "Qual destes é um órgão do sistema respiratório?", a: ["Fígado", "Estômago", "Pulmão", "Rim"], c: 2 },
        { q: "Quantos cromossomas tem um ser humano normal?", a: ["46", "48", "44", "23"], c: 0 },
        { q: "Qual a principal função dos glóbulos vermelhos?", a: ["Defesa", "Coagulação", "Transporte de oxigénio", "Produção de anticorpos"], c: 2 },
        { q: "O que é uma célula procariótica?", a: ["Com núcleo definido", "Sem núcleo definido", "Com mitocôndrias", "Com cloroplastos"], c: 1 },
        { q: "Qual é o maior osso do corpo humano?", a: ["Tíbia", "Fémur", "Úmero", "Rádio"], c: 1 },
        { q: "O que significa ADN?", a: ["Ácido Desoxirribonucleico", "Ácido Ribonucleico", "Aminoácido", "Adenosina"], c: 0 },
        { q: "Qual destes é um mamífero marinho?", a: ["Tubarão", "Salmão", "Golfinho", "Polvo"], c: 2 },
        { q: "Quantos dentes tem um adulto humano completo?", a: ["28", "30", "32", "34"], c: 2 },
        { q: "Qual a função do coração?", a: ["Digestão", "Bombear sangue", "Filtrar toxinas", "Produzir hormonas"], c: 1 },
        { q: "Qual destes é um réptil?", a: ["Sapo", "Salamandra", "Cobra", "Tubarão"], c: 2 },
        { q: "O que é a clorofila?", a: ["Pigmento verde", "Hormona", "Enzima", "Vitamina"], c: 0 },
        { q: "Qual a parte do cérebro responsável pela memória?", a: ["Cerebelo", "Hipotálamo", "Hipocampo", "Tronco cerebral"], c: 2 },
        { q: "O que são os neurónios?", a: ["Células da pele", "Células nervosas", "Células sanguíneas", "Células ósseas"], c: 1 },
        { q: "Qual é o grupo sanguíneo doador universal?", a: ["A", "B", "AB", "O"], c: 3 },
        { q: "O que é a medula óssea?", a: ["Tecido adiposo", "Tecido produtor de sangue", "Tecido muscular", "Tecido conjuntivo"], c: 1 },

        { q: "Qual destas é uma doença viral?", a: ["Tétano", "Gripe", "Salmonelose", "Malária"], c: 1 }
      ];
    }

    // Geografia - 20 perguntas
    function generateGeographyQuestions() {
      return [
        { q: "Qual é o maior continente do mundo?", a: ["África", "América", "Ásia", "Europa"], c: 2 },
        { q: "Qual a capital de Portugal?", a: ["Porto", "Lisboa", "Coimbra", "Braga"], c: 1 },
        { q: "Qual é o maior país do mundo em área?", a: ["China", "EUA", "Canadá", "Rússia"], c: 3 },
        { q: "Qual é o rio mais longo do mundo?", a: ["Amazonas", "Nilo", "Yangtzé", "Mississippi"], c: 1 },

        { q: "Qual a capital de Espanha?", a: ["Barcelona", "Valência", "Madrid", "Sevilha"], c: 2 },
        { q: "Quantos estados tem os EUA?", a: ["50", "51", "49", "52"], c: 0 },
        { q: "Qual é o deserto mais grande do mundo (não polar)?", a: ["Gobi", "Saara", "Atacama", "Kalahari"], c: 1 },
        { q: "Em que país fica a Torre Eiffel?", a: ["Itália", "Alemanha", "França", "Inglaterra"], c: 2 },
        { q: "Qual destes é um país da América do Sul?", a: ["México", "Panamá", "Chile", "Guatemala"], c: 2 },
        { q: "Qual a capital da Austrália?", a: ["Sydney", "Melbourne", "Camberra", "Perth"], c: 2 },
        { q: "Qual é o país mais populoso do mundo?", a: ["Índia", "China", "EUA", "Indonésia"], c: 1 },
        { q: "Qual o ponto mais baixo da Terra?", a: ["Vale da Morte", "Mar Morto", "Fossa das Marianas", "Lago Assal"], c: 1 },

    // Matemática - 20 perguntas
    function generateMathQuestions() {
      return [
        { q: "Quanto é a soma dos ângulos internos de um triângulo?", a: ["90°", "360°", "180°", "270°"], c: 2 },
        { q: "Qual a fórmula da área do círculo?", a: ["π * r²", "2 * π * r", "Base * Altura", "π * d"], c: 0 },

        { q: "Qual é a raiz quadrada de 144?", a: ["10", "11", "12", "13"], c: 2 },
        { q: "Quanto é 7 × 8?", a: ["48", "56", "54", "64"], c: 1 },
        { q: "Quanto é 100 ÷ 4?", a: ["20", "25", "30", "35"], c: 1 },

        { q: "Quanto é 9 × 9?", a: ["72", "81", "90", "99"], c: 1 },
        { q: "Qual é a raiz cúbica de 27?", a: ["2", "3", "4", "5"], c: 1 },
        { q: "Quanto é 40% de 50?", a: ["15", "20", "25", "30"], c: 1 },
        { q: "Se X + 5 = 12, qual é o valor de X?", a: ["5", "6", "7", "8"], c: 2 },
        { q: "Quanto é 11²?", a: ["111", "121", "131", "141"], c: 1 },
        { q: "Qual a soma dos ângulos internos de um quadrilátero?", a: ["180°", "270°", "360°", "450°"], c: 2 },
        { q: "Quanto é 6! (fatorial de 6)?", a: ["120", "360", "720", "5040"], c: 2 },
        { q: "Qual é o MMC de 4 e 6?", a: ["8", "10", "12", "14"], c: 2 }
      ];
    }

    // Cinema - 20 perguntas
    function generateCinemaQuestions() {
      return [
        { q: "Quem dirigiu o filme 'Titanic'?", a: ["Steven Spielberg", "James Cameron", "Christopher Nolan", "Quentin Tarantino"], c: 1 },
        { q: "Qual ator interpreta o Tony Stark (Homem de Ferro)?", a: ["Chris Evans", "Chris Hemsworth", "Robert Downey Jr.", "Mark Ruffalo"], c: 2 },
        { q: "Qual filme ganhou o Oscar de Melhor Filme em 2020?", a: ["1917", "Joker", "Parasita", "Once Upon a Time in Hollywood"], c: 2 },
        { q: "Quem é o protagonista de 'Matrix'?", a: ["Morpheus", "Neo", "Trinity", "Smith"], c: 1 },
        { q: "Qual é o nome do feiticeiro de 'O Senhor dos Anéis'?", a: ["Bilbo", "Frodo", "Gandalf", "Aragorn"], c: 2 },
        { q: "Que filme tem a famosa frase: 'May the Force be with you'?", a: ["Star Trek", "Star Wars", "Duna", "Indiana Jones"], c: 1 },
        { q: "Qual atriz interpreta Katniss Everdeen em 'Os Jogos da Fome'?", a: ["Emma Watson", "Jennifer Lawrence", "Scarlett Johansson", "Kristen Stewart"], c: 1 },
        { q: "Quem dirigiu 'Pulp Fiction'?", a: ["Martin Scorsese", "David Fincher", "Quentin Tarantino", "Francis Ford Coppola"], c: 2 },
        { q: "Qual é o filme mais premiado da história do Oscar?", a: ["Titanic", "Ben-Hur", "O Senhor dos Anéis: O Retorno do Rei", "La La Land"], c: 2 },
        { q: "Qual ator interpreta Jack Sparrow?", a: ["Brad Pitt", "Johnny Depp", "Leonardo DiCaprio", "Will Smith"], c: 1 },
        { q: "Em que filme aparece o personagem 'Hannibal Lecter'?", a: ["Psicopata Americano", "Seven", "O Silêncio dos Inocentes", "Clube de Combate"], c: 2 },
        { q: "Qual é o filme de animação da Pixar sobre monstros?", a: ["Toy Story", "Monstros S.A.", "Carros", "Up"], c: 1 },
        { q: "Quem interpreta o Coringa em 'O Cavaleiro das Trevas'?", a: ["Jared Leto", "Jack Nicholson", "Heath Ledger", "Joaquin Phoenix"], c: 2 },
        { q: "Qual destes filmes é dirigido por Christopher Nolan?", a: ["A Origem", "O Irlandês", "Blade Runner 2049", "1917"], c: 0 },
        { q: "Qual é o filme com a maior bilheteira de sempre (sem inflação)?", a: ["Avatar", "Vingadores: Endgame", "Titanic", "Star Wars: O Despertar da Força"], c: 0 },
        { q: "Quem dirigiu 'O Poderoso Chefão'?", a: ["Martin Scorsese", "Francis Ford Coppola", "Brian De Palma", "Sergio Leone"], c: 1 },
        { q: "Qual ator é conhecido por interpretar Rocky Balboa?", a: ["Arnold Schwarzenegger", "Sylvester Stallone", "Bruce Willis", "Jean-Claude Van Damme"], c: 1 },
        { q: "Qual filme tem a música 'My Heart Will Go On'?", a: ["Ghost", "Titanic", "Armageddon", "Pearl Harbor"], c: 1 },
        { q: "Qual atriz ganhou o Oscar por 'La La Land'?", a: ["Emma Stone", "Natalie Portman", "Meryl Streep", "Amy Adams"], c: 0 },
        { q: "Em que ano estreou o primeiro filme do Harry Potter?", a: ["1999", "2000", "2001", "2002"], c: 2 }
      ];
    }

    // Desporto - 20 perguntas
    function generateSportsQuestions() {
      return [
        { q: "Quem ganhou a Copa do Mundo de 2018?", a: ["Alemanha", "Brasil", "França", "Argentina"], c: 2 },
        { q: "Qual jogador tem mais Bolas de Ouro?", a: ["Cristiano Ronaldo", "Lionel Messi", "Neymar", "Mbappé"], c: 1 },
        { q: "Qual é o clube com mais Champions League?", a: ["Bayern", "Milan", "Real Madrid", "Liverpool"], c: 2 },
        { q: "Quem é o maior vencedor de Wimbledon (ténis masculino)?", a: ["Roger Federer", "Novak Djokovic", "Rafael Nadal", "Pete Sampras"], c: 0 },
        { q: "Qual equipa venceu a NBA em 2023?", a: ["Golden State Warriors", "Miami Heat", "Denver Nuggets", "Boston Celtics"], c: 2 },
        { q: "Quem é conhecido como 'The King' no basquetebol?", a: ["Kobe Bryant", "Michael Jordan", "LeBron James", "Magic Johnson"], c: 2 },
        { q: "Qual país venceu o Rugby World Cup de 2019?", a: ["Nova Zelândia", "Inglaterra", "África do Sul", "Austrália"], c: 2 },
        { q: "Quem detém o recorde mundial dos 100 metros?", a: ["Usain Bolt", "Tyson Gay", "Yohan Blake", "Justin Gatlin"], c: 0 },
        { q: "Qual clube português venceu a Liga Europa em 2011?", a: ["Benfica", "Sporting", "Porto", "Braga"], c: 2 },
        { q: "Qual piloto tem mais títulos de Fórmula 1?", a: ["Ayrton Senna", "Michael Schumacher", "Lewis Hamilton", "Sebastian Vettel"], c: 2 },
        { q: "Qual é o desporto nacional do Canadá no verão?", a: ["Futebol", "Hóquei", "Lacrosse", "Baseball"], c: 2 },
        { q: "Qual nadador tem mais medalhas olímpicas?", a: ["Mark Spitz", "Michael Phelps", "Ryan Lochte", "Ian Thorpe"], c: 1 },
        { q: "Qual clube inglês tem mais títulos da Premier League?", a: ["Manchester United", "Liverpool", "Arsenal", "Chelsea"], c: 0 },
        { q: "Quem venceu o Tour de France 2022?", a: ["Tadej Pogačar", "Jonas Vingegaard", "Geraint Thomas", "Chris Froome"], c: 1 },
        { q: "Qual jogador é conhecido por 'King Eric' no Manchester United?", a: ["Eric Cantona", "David Beckham", "Ryan Giggs", "Wayne Rooney"], c: 0 },
        { q: "Qual país venceu o Mundial de Futebol Feminino de 2019?", a: ["Alemanha", "França", "EUA", "Japão"], c: 2 },
        { q: "Qual lutador de MMA tem mais vitórias no UFC?", a: ["Khabib Nurmagomedov", "Conor McGregor", "Anderson Silva", "Jon Jones"], c: 3 },
        { q: "Qual é o recorde mundial de salto em altura masculino?", a: ["2,40m", "2,45m", "2,50m", "2,55m"], c: 1 },
        { q: "Qual equipa venceu a Super Bowl de 2023?", a: ["Philadelphia Eagles", "Kansas City Chiefs", "San Francisco 49ers", "Cincinnati Bengals"], c: 1 },
        { q: "Quem é o maior artilheiro da história do futebol (gols oficiais)?", a: ["Pelé", "Cristiano Ronaldo", "Lionel Messi", "Romário"], c: 1 }
      ];
    }

    let state = {
      quiz: null,
      index: 0,
      points: 0,
      corrects: 0,
      timer: null,
      timeLeft: 20,
      canAnswer: true
    };

    window.onload = () => {
      const list = document.getElementById("quizList");
      quizzes.forEach(q => {
        const div = document.createElement("div");
        div.className = "quiz-item";
        div.innerHTML = `${q.icon || "📚"} ${q.title}<small>20 perguntas</small>`;
        div.onclick = () => startQuiz(q.id);
        list.appendChild(div);
      });
    };

    async function startQuiz(id) {
      state.quiz = quizzes.find(q => q.id === id);
      state.index = 0;
      state.points = 0;
      state.corrects = 0;
      
      showScreen("loadingScreen");
      
      // Simular loading para melhor experiência
      await new Promise(resolve => setTimeout(resolve, 800));
      
      document.getElementById("headerScore").style.display = "block";
      showScreen("quizScreen");
      loadQuestion();
    }

    function loadQuestion() {
      state.canAnswer = true;
      state.timeLeft = 20;
      const q = state.quiz.questions[state.index];
      
      document.getElementById("questionCounter").innerHTML = `<strong>❓ PERGUNTA ${state.index + 1} DE ${state.quiz.questions.length}</strong>`;
      document.getElementById("questionText").innerText = q.q;
      
      q.a.forEach((text, i) => {
        const btn = document.getElementById(`opt${i}`);
        btn.innerText = text;
        btn.className = "answer-btn";
      });

      startTimer();
    }

    function startTimer() {
      const fill = document.getElementById("timerFill");
      fill.style.transition = "none";
      fill.style.width = "100%";
      
      clearInterval(state.timer);
      state.timer = setInterval(() => {
        state.timeLeft -= 1;
        fill.style.transition = "width 1s linear";
        fill.style.width = (state.timeLeft / 20 * 100) + "%";

        if (state.timeLeft <= 0) {
          handleAnswer(-1);
        }
      }, 1000);
    }

    function handleAnswer(choice) {
      if (!state.canAnswer) return;
      state.canAnswer = false;
      clearInterval(state.timer);

      const correctIndex = state.quiz.questions[state.index].c;
      const btns = document.querySelectorAll(".answer-btn");

      if (choice === correctIndex) {
        const bonus = state.timeLeft * 25;
        state.points += (500 + bonus);
        state.corrects++;
        btns[choice].classList.add("correct");
      } else {
        if (choice !== -1 && btns[choice]) btns[choice].classList.add("wrong");
        btns[correctIndex].classList.add("correct");
      }

      document.getElementById("livePoints").innerText = Math.floor(state.points);

      setTimeout(() => {
        state.index++;
        if (state.index < state.quiz.questions.length) {
          loadQuestion();
        } else {
          showResults();
        }
      }, 1500);
    }

    function showResults() {
      showScreen("resultsScreen");
      document.getElementById("headerScore").style.display = "none";
      document.getElementById("finalScore").innerHTML = `🏆 ${Math.floor(state.points)} PTS`;
      document.getElementById("correctCount").innerHTML = `${state.corrects} / ${state.quiz.questions.length}`;
      
      const percent = (state.corrects / state.quiz.questions.length) * 100;
      document.getElementById("percentCorrect").innerHTML = percent.toFixed(1);
      
      let feedback = "";
      if (percent >= 80) feedback = "🌟 Espetacular! És um verdadeiro génio!";
      else if (percent >= 60) feedback = "🎉 Muito bom! Continua assim!";
      else if (percent >= 40) feedback = "📚 Bom esforço! Estuda mais um pouco e tenta outra vez.";
      else feedback = "💪 Não desistas! Cada erro é uma lição. Tenta novamente!";
      
      document.getElementById("feedbackText").innerHTML = feedback;
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }
  </script>
  <script src="kapoot-header.js"></script>

  <script>
    /* KAPOOT DB INTEGRATION — quiz.html */
    (function () {
      /* Hook no fim do quiz: quando o ecrã de resultados aparece,
         envia o score para a BD se o utilizador estiver autenticado. */
      const origShowResults = window.showResults;
      if (typeof origShowResults !== 'function') return;

      window.showResults = function () {
        origShowResults.apply(this, arguments);

        try {
          if (Kapoot.isLoggedIn() && typeof state !== 'undefined' && state.quiz) {
            fetch('api/guardar_resultado.php', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                kahoot_id: state.quiz.id,
                pontos:    Math.floor(state.points),
                acertos:   state.corrects,
                total:     state.quiz.questions.length
              })
            })
            .then(function (r) { return r.json(); })
            .then(function (d) {
              if (d && d.ok) {
                kapootToast('✅ Resultado guardado! +' + d.xp_ganho + ' XP');
              }
            })
            .catch(function () { /* silencioso */ });
          }
        } catch (e) { /* não interrompe o jogo */ }
      };
    })();
  </script>
