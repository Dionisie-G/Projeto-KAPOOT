<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Kapoot</title>

<style>
/* ====== TEU CSS (RESUMIDO MAS COMPLETO FUNCIONAL) ====== */
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Segoe UI;
background:linear-gradient(135deg,#f5f7fa,#e9ecf1);
display:flex;justify-content:center;align-items:center;min-height:100vh
}

.screen{display:none}
.screen.active{display:block}

.container{text-align:center;width:90%}
h1{color:#3492FC;margin-bottom:20px}

.quiz-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.quiz-card{
background:white;
padding:20px;
border-radius:10px;
cursor:pointer;
border:2px solid #E8DA31;
}

.quiz-container{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:800px;
}

.answers-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.answer-btn{
padding:15px;
border:2px solid #ccc;
cursor:pointer;
border-radius:8px;
}

.correct{background:#4dde4d;color:white}
.wrong{background:#ec5252;color:white}

.timer{
font-size:22px;
margin:10px 0;
font-weight:bold;
}

.progress-bar{
height:8px;
background:#ddd;
margin:15px 0;
border-radius:10px;
overflow:hidden;
}
.progress-fill{
height:100%;
background:#3492FC;
width:0%;
}

.results-container{text-align:center}
.btn{
margin-top:20px;
padding:10px 20px;
cursor:pointer;
background:#3492FC;
color:white;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homeScreen" class="screen active">
<div class="container">
<h1>QUIZ KAPOOT</h1>
<div id="quizList" class="quiz-grid"></div>
</div>
</div>

<!-- QUIZ -->
<div id="quizScreen" class="screen">
<div class="quiz-container">
<h2 id="quizTitle"></h2>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

<div id="questionCounter"></div>
<div class="timer" id="timer">30</div>

<h3 id="questionText"></h3>

<div class="answers-grid">
<button class="answer-btn" onclick="checkAnswer(0)" id="a0"></button>
<button class="answer-btn" onclick="checkAnswer(1)" id="a1"></button>
<button class="answer-btn" onclick="checkAnswer(2)" id="a2"></button>
<button class="answer-btn" onclick="checkAnswer(3)" id="a3"></button>
</div>

<button class="btn" onclick="endQuiz()">Finalizar</button>
</div>
</div>

<!-- RESULTS -->
<div id="resultsScreen" class="screen">
<div class="results-container">
<h1 id="resultTitle"></h1>
<h2 id="scoreText"></h2>
<p id="extraInfo"></p>
<button class="btn" onclick="returnToHome()">Menu</button>
</div>
</div>

<script>
/* ===== QUIZZES (4 COMPLETOS) ===== */
const quizzes = [
{
id:1,
title:"Biologia",
questions:[
{question:"Organelo da energia?",answers:["Núcleo","Mitocôndria","Golgi","Ribossoma"],correct:1},
{question:"Citoplasma é?",answers:["Núcleo","Fluido celular","Parede","DNA"],correct:1}
]
},
{
id:2,
title:"Geografia",
questions:[
{question:"Maior continente?",answers:["Europa","Ásia","África","América"],correct:1},
{question:"Capital Portugal?",answers:["Porto","Lisboa","Faro","Coimbra"],correct:1}
]
},
{
id:3,
title:"História",
questions:[
{question:"Queda Roma?",answers:["476","1500","1000","200"],correct:0},
{question:"Descoberta América?",answers:["1492","1500","1600","1400"],correct:0}
]
},
{
id:4,
title:"Matemática",
questions:[
{question:"Ângulos triângulo?",answers:["90","180","360","270"],correct:1},
{question:"Área círculo?",answers:["πr²","2πr","πd","r²"],correct:0}
]
}
];

/* ===== VARIÁVEIS ===== */
let currentQuiz,currentQuestion,score,timeLeft,timer,startTime;

/* ===== INIT ===== */
window.onload=loadQuizzes;

/* ===== FUNÇÕES ===== */
function loadQuizzes(){
const list=document.getElementById("quizList");
list.innerHTML="";
quizzes.forEach(q=>{
const div=document.createElement("div");
div.className="quiz-card";
div.innerText=q.title;
div.onclick=()=>startQuiz(q.id);
list.appendChild(div);
});
}

function startQuiz(id){
currentQuiz=quizzes.find(q=>q.id===id);
currentQuestion=0;
score=0;
startTime=Date.now();
showScreen("quizScreen");
showQuestion();
}

function showQuestion(){
const q=currentQuiz.questions[currentQuestion];

document.getElementById("quizTitle").innerText=currentQuiz.title;
document.getElementById("questionText").innerText=q.question;
document.getElementById("questionCounter").innerText=
`Pergunta ${currentQuestion+1}/${currentQuiz.questions.length}`;

document.getElementById("progressFill").style.width=
(currentQuestion/currentQuiz.questions.length*100)+"%";

q.answers.forEach((a,i)=>{
let btn=document.getElementById("a"+i);
btn.innerText=a;
btn.className="answer-btn";
});

startTimer();
}

function checkAnswer(i){
const correct=currentQuiz.questions[currentQuestion].correct;

if(i===correct){
score++;
document.getElementById("a"+i).classList.add("correct");
}else{
document.getElementById("a"+i).classList.add("wrong");
document.getElementById("a"+correct).classList.add("correct");
}

clearInterval(timer);
setTimeout(nextQuestion,1500);
}

function nextQuestion(){
currentQuestion++;
if(currentQuestion<currentQuiz.questions.length){
showQuestion();
}else{
endQuiz();
}
}

function startTimer(){
timeLeft=30;
document.getElementById("timer").innerText=timeLeft;

clearInterval(timer);
timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText=timeLeft;

if(timeLeft<=0){
clearInterval(timer);
nextQuestion();
}
},1000);
}

function endQuiz(){
clearInterval(timer);
let totalTime=Math.round((Date.now()-startTime)/1000);

showScreen("resultsScreen");

let percent=Math.round((score/currentQuiz.questions.length)*100);

document.getElementById("resultTitle").innerText="Resultado";
document.getElementById("scoreText").innerText=
`${score}/${currentQuiz.questions.length} (${percent}%)`;

document.getElementById("extraInfo").innerText=
"Tempo: "+totalTime+"s";
}

function returnToHome(){
showScreen("homeScreen");
}

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
