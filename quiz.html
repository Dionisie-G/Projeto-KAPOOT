<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Kapoot</title>

<style>
/* ==== CSS ==== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f5f7fa, #e9ecf1);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Screens */
.screen { display: none; }
.screen.active { display: block; }

/* Home */
.container { width: 90%; max-width: 1000px; text-align: center; }

h1 { color: #3492FC; font-size: 3rem; }

.quiz-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.quiz-card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid #E8DA31;
}

/* Quiz */
.quiz-container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 700px;
}

.answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.answer-btn {
    padding: 10px;
    border: 2px solid #ccc;
    cursor: pointer;
}

.correct { background: #4dde4d; color: white; }
.wrong { background: #ec5252; color: white; }

.timer {
    font-size: 20px;
    margin: 10px 0;
}

/* Results */
.results-container {
    text-align: center;
}

.btn {
    margin-top: 20px;
    padding: 10px 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="homeScreen" class="screen active">
    <div class="container">
        <h1>QUIZ KAPOOT</h1>
        <div id="quizList" class="quiz-grid"></div>
    </div>
</div>

<!-- QUIZ -->
<div id="quizScreen" class="screen">
    <div class="quiz-container">
        <h2 id="quizTitle"></h2>
        <div id="questionCounter"></div>
        <div class="timer" id="timer">30</div>
        <h3 id="questionText"></h3>

        <div class="answers-grid">
            <button class="answer-btn" onclick="checkAnswer(0)" id="a0"></button>
            <button class="answer-btn" onclick="checkAnswer(1)" id="a1"></button>
            <button class="answer-btn" onclick="checkAnswer(2)" id="a2"></button>
            <button class="answer-btn" onclick="checkAnswer(3)" id="a3"></button>
        </div>

        <button class="btn" onclick="endQuiz()">Finalizar</button>
    </div>
</div>

<!-- RESULTS -->
<div id="resultsScreen" class="screen">
    <div class="results-container">
        <h1 id="resultTitle"></h1>
        <h2 id="scoreText"></h2>
        <button class="btn" onclick="returnToHome()">Menu</button>
    </div>
</div>

<script>
/* ==== QUIZ DATA ==== */
const quizzes = [
{
    id: 1,
    title: "Biologia",
    questions: [
        {
            question: "Qual organela produz energia?",
            answers: ["Núcleo", "Mitocôndria", "Ribossoma", "Golgi"],
            correct: 1
        },
        {
            question: "Quantos cromossomas tem o ser humano?",
            answers: ["23", "46", "50", "92"],
            correct: 1
        }
    ]
},
{
    id: 2,
    title: "Geografia",
    questions: [
        {
            question: "Maior continente?",
            answers: ["Europa", "Ásia", "África", "América"],
            correct: 1
        }
    ]
}
];

/* ==== VARIÁVEIS ==== */
let currentQuiz, currentQuestion, score, timer, timeLeft;

/* ==== INIT ==== */
window.onload = () => loadQuizzes();

/* ==== FUNÇÕES ==== */
function loadQuizzes() {
    const list = document.getElementById("quizList");
    list.innerHTML = "";

    quizzes.forEach(q => {
        const div = document.createElement("div");
        div.className = "quiz-card";
        div.innerText = q.title;
        div.onclick = () => startQuiz(q.id);
        list.appendChild(div);
    });
}

function startQuiz(id) {
    currentQuiz = quizzes.find(q => q.id === id);
    currentQuestion = 0;
    score = 0;
    showScreen("quizScreen");
    showQuestion();
}

function showQuestion() {
    const q = currentQuiz.questions[currentQuestion];

    document.getElementById("quizTitle").innerText = currentQuiz.title;
    document.getElementById("questionText").innerText = q.question;
    document.getElementById("questionCounter").innerText =
        `Pergunta ${currentQuestion+1}/${currentQuiz.questions.length}`;

    q.answers.forEach((a, i) => {
        document.getElementById("a"+i).innerText = a;
        document.getElementById("a"+i).className = "answer-btn";
    });

    startTimer();
}

function checkAnswer(i) {
    const correct = currentQuiz.questions[currentQuestion].correct;

    if (i === correct) {
        score++;
        document.getElementById("a"+i).classList.add("correct");
    } else {
        document.getElementById("a"+i).classList.add("wrong");
        document.getElementById("a"+correct).classList.add("correct");
    }

    clearInterval(timer);
    setTimeout(nextQuestion, 1500);
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < currentQuiz.questions.length) {
        showQuestion();
    } else {
        endQuiz();
    }
}

function startTimer() {
    timeLeft = 30;
    document.getElementById("timer").innerText = timeLeft;

    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;

        if (timeLeft === 0) {
            clearInterval(timer);
            nextQuestion();
        }
    }, 1000);
}

function endQuiz() {
    showScreen("resultsScreen");
    document.getElementById("resultTitle").innerText = "Resultado";
    document.getElementById("scoreText").innerText =
        `${score}/${currentQuiz.questions.length}`;
}

function returnToHome() {
    showScreen("homeScreen");
}

function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
